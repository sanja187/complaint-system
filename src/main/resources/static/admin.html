<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Complaint System</title>
    <link rel="stylesheet" href="css/style.css">
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>

<body class="app-page">
    <header>
        <div class="container">
            <h1>Admin Dashboard</h1>
            <nav>
                <button onclick="logout()">Logout</button>
            </nav>
        </div>
    </header>

	<main class="container">
		<section class="stats-cards">
		    <div class="card"><h3>Total Complaints</h3><p id="totalComplaints">0</p></div>
		    <div class="card"><h3>Pending</h3><p id="pendingComplaints">0</p></div>
		    <div class="card"><h3>Resolved</h3><p id="resolvedComplaints">0</p></div>
		    <div class="card"><h3>Rejected</h3><p id="rejectedComplaints">0</p></div>
		</section>

		<div class="section-divider">
		    <h2>All Complaints</h2>
		    
		</div>

		<div class="table-wrapper">
		    <section class="all-complaints">
		        <table id="adminTable">
		            <thead>
		                <tr>
		                    <th>ID</th>
		                    <th>Title</th>
		                    <th>Category</th>
		                    <th>Status</th>
		                    <th>User Email</th>
		                    <th>Date</th>
		                    <th>Address</th>
		                    <th>Photo</th>
		                    <th>Update Status</th>
							<th>Admin Comment
								
							</th>
		                </tr>
		            </thead>
		            <tbody></tbody>
		        </table>
		    </section>
		</div>

	</main>

	<script src="js/auth.js"></script>
	<script src="js/admin.js"></script>

</body>
</html>
